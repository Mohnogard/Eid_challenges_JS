<body>
    <script>

let data = [1,4,20,3,10,5,4,3,1,20] //10 
let target=33

function periods (data, target){
    var results = []
    for (let i=0; i<=data.length-1;i++){
        let counter=0
        let start=i
        console.log("............")
        for (let j=i; j<=data.length-1;j++){
            counter+=data[j]
            if (counter===target){
                results.push("From day" + start + "to "+ j)
            }
        }
    }
    if (results.length==0){
        results=(-1)
    }
    return(results)
}


console.log(periods(data, target))
    </script>
</body>
